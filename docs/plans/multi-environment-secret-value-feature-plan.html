  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;

&lt;body&gt;
&lt;main id=&quot;multi-environment-secret-plan&quot; class=&quot;plan-shell&quot;&gt;
  &lt;section class=&quot;plan-hero&quot; aria-labelledby=&quot;plan-title&quot;&gt;
    &lt;div&gt;
      &lt;span class=&quot;viz-badge&quot;&gt;Feature plan · review draft&lt;/span&gt;
      &lt;h1 id=&quot;plan-title&quot;&gt;One secret value, multiple environments&lt;/h1&gt;
      &lt;p class=&quot;hero-copy&quot;&gt;Let a user enter a secret once and save an independently encrypted copy to every environment they select.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;hero-outcome&quot;&gt;
      &lt;span class=&quot;text-small text-muted&quot;&gt;Recommended direction&lt;/span&gt;
      &lt;strong&gt;Option A · destination checklist&lt;/strong&gt;
      &lt;span class=&quot;text-small&quot;&gt;Smallest workflow change, clear before save.&lt;/span&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;nav class=&quot;plan-nav&quot; aria-label=&quot;Plan sections&quot;&gt;
    &lt;a href=&quot;#decision&quot;&gt;UI options&lt;/a&gt;
    &lt;a href=&quot;#contract&quot;&gt;Feature contract&lt;/a&gt;
    &lt;a href=&quot;#architecture&quot;&gt;Architecture&lt;/a&gt;
    &lt;a href=&quot;#delivery&quot;&gt;Delivery plan&lt;/a&gt;
    &lt;a href=&quot;#acceptance&quot;&gt;Acceptance&lt;/a&gt;
    &lt;a href=&quot;#questions&quot;&gt;Questions&lt;/a&gt;
  &lt;/nav&gt;

  &lt;section class=&quot;plan-section&quot; aria-labelledby=&quot;summary-heading&quot;&gt;
    &lt;div class=&quot;section-kicker&quot;&gt;Outcome&lt;/div&gt;
    &lt;h2 id=&quot;summary-heading&quot;&gt;What changes for the user&lt;/h2&gt;
    &lt;div class=&quot;summary-grid&quot;&gt;
      &lt;article class=&quot;summary-item&quot;&gt;
        &lt;span class=&quot;summary-number&quot;&gt;01&lt;/span&gt;
        &lt;strong&gt;Enter once&lt;/strong&gt;
        &lt;p&gt;Secret fields and encrypted notes are authored a single time.&lt;/p&gt;
      &lt;/article&gt;
      &lt;article class=&quot;summary-item&quot;&gt;
        &lt;span class=&quot;summary-number&quot;&gt;02&lt;/span&gt;
        &lt;strong&gt;Choose destinations&lt;/strong&gt;
        &lt;p&gt;Only environments the current device can unlock are selectable.&lt;/p&gt;
      &lt;/article&gt;
      &lt;article class=&quot;summary-item&quot;&gt;
        &lt;span class=&quot;summary-number&quot;&gt;03&lt;/span&gt;
        &lt;strong&gt;Encrypt per environment&lt;/strong&gt;
        &lt;p&gt;The browser creates separate ciphertext using each environment key and AAD.&lt;/p&gt;
      &lt;/article&gt;
      &lt;article class=&quot;summary-item&quot;&gt;
        &lt;span class=&quot;summary-number&quot;&gt;04&lt;/span&gt;
        &lt;strong&gt;Save atomically&lt;/strong&gt;
        &lt;p&gt;All selected values commit together, or none are changed.&lt;/p&gt;
      &lt;/article&gt;
    &lt;/div&gt;
    &lt;div class=&quot;scope-note&quot;&gt;
      &lt;i data-lucide=&quot;git-branch&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
      &lt;span&gt;&lt;strong&gt;Snapshot semantics:&lt;/strong&gt; values are identical at save time, not permanently linked. A later edit affects only the environment being edited unless the user selects multiple destinations again.&lt;/span&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;decision&quot; class=&quot;plan-section&quot; aria-labelledby=&quot;decision-heading&quot;&gt;
    &lt;div class=&quot;section-kicker&quot;&gt;UI decision&lt;/div&gt;
    &lt;h2 id=&quot;decision-heading&quot;&gt;Three ways to add the workflow&lt;/h2&gt;
    &lt;p class=&quot;section-intro&quot;&gt;Switch between complete, inspectable mockups. Each keeps the current modal, environment vocabulary, and client-side encryption message.&lt;/p&gt;

    &lt;div class=&quot;option-switcher&quot; role=&quot;tablist&quot; aria-label=&quot;UI mockup options&quot;&gt;
      &lt;button class=&quot;btn is-selected&quot; type=&quot;button&quot; role=&quot;tab&quot; aria-selected=&quot;true&quot; aria-controls=&quot;mockup-a&quot; id=&quot;tab-a&quot; data-option-tab=&quot;a&quot;&gt;
        &lt;span&gt;A&lt;/span&gt; Destination checklist
      &lt;/button&gt;
      &lt;button class=&quot;btn&quot; type=&quot;button&quot; role=&quot;tab&quot; aria-selected=&quot;false&quot; aria-controls=&quot;mockup-b&quot; id=&quot;tab-b&quot; data-option-tab=&quot;b&quot;&gt;
        &lt;span&gt;B&lt;/span&gt; Value strategy
      &lt;/button&gt;
      &lt;button class=&quot;btn&quot; type=&quot;button&quot; role=&quot;tab&quot; aria-selected=&quot;false&quot; aria-controls=&quot;mockup-c&quot; id=&quot;tab-c&quot; data-option-tab=&quot;c&quot;&gt;
        &lt;span&gt;C&lt;/span&gt; Copy after save
      &lt;/button&gt;
    &lt;/div&gt;

    &lt;article class=&quot;mockup-option&quot; id=&quot;mockup-a&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;tab-a&quot; data-option-panel=&quot;a&quot;&gt;
      &lt;div class=&quot;option-header&quot;&gt;
        &lt;div&gt;
          &lt;div class=&quot;option-title&quot;&gt;&lt;span class=&quot;option-letter&quot;&gt;A&lt;/span&gt;&lt;h3&gt;Destination checklist&lt;/h3&gt;&lt;span class=&quot;viz-badge&quot;&gt;Recommended&lt;/span&gt;&lt;/div&gt;
          &lt;p&gt;Select destinations inside the existing editor. The current environment stays selected.&lt;/p&gt;
        &lt;/div&gt;
        &lt;button class=&quot;btn btn-primary choose-option&quot; type=&quot;button&quot; data-choose=&quot;A · destination checklist&quot;&gt;Choose A&lt;/button&gt;
      &lt;/div&gt;
      &lt;div class=&quot;product-stage&quot; data-environment=&quot;development&quot;&gt;
        &lt;div class=&quot;product-modal&quot;&gt;
          &lt;header class=&quot;product-modal-header&quot;&gt;
            &lt;div&gt;
              &lt;strong&gt;Create secret&lt;/strong&gt;
              &lt;span&gt;Development · encrypted before upload&lt;/span&gt;
            &lt;/div&gt;
            &lt;button class=&quot;icon-action&quot; type=&quot;button&quot; aria-label=&quot;Close mockup&quot;&gt;&lt;i data-lucide=&quot;x&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;/button&gt;
          &lt;/header&gt;
          &lt;div class=&quot;product-modal-body&quot;&gt;
            &lt;div class=&quot;field-grid&quot;&gt;
              &lt;label class=&quot;form-label&quot;&gt;Display name&lt;input class=&quot;form-control&quot; value=&quot;Stripe dashboard&quot; aria-label=&quot;Option A display name&quot;&gt;&lt;/label&gt;
              &lt;label class=&quot;form-label&quot;&gt;Secret type&lt;select class=&quot;form-select&quot; aria-label=&quot;Option A secret type&quot;&gt;&lt;option&gt;Login&lt;/option&gt;&lt;/select&gt;&lt;/label&gt;
            &lt;/div&gt;
            &lt;label class=&quot;form-label&quot;&gt;Project&lt;select class=&quot;form-select&quot; aria-label=&quot;Option A project&quot;&gt;&lt;option&gt;Customer portal&lt;/option&gt;&lt;/select&gt;&lt;/label&gt;
            &lt;div class=&quot;field-grid&quot;&gt;
              &lt;label class=&quot;form-label&quot;&gt;Username&lt;input class=&quot;form-control&quot; value=&quot;ops@example.com&quot; aria-label=&quot;Option A username&quot;&gt;&lt;/label&gt;
              &lt;label class=&quot;form-label&quot;&gt;Password&lt;input class=&quot;form-control&quot; type=&quot;password&quot; value=&quot;example-password&quot; aria-label=&quot;Option A password&quot;&gt;&lt;/label&gt;
            &lt;/div&gt;
            &lt;fieldset class=&quot;destination-field&quot;&gt;
              &lt;legend&gt;Save this value to&lt;/legend&gt;
              &lt;p&gt;Each selected environment receives its own encrypted copy.&lt;/p&gt;
              &lt;div class=&quot;environment-choices&quot;&gt;
                &lt;label class=&quot;environment-choice is-current&quot;&gt;
                  &lt;input type=&quot;checkbox&quot; checked disabled data-env-a&gt;
                  &lt;span&gt;&lt;strong&gt;Development&lt;/strong&gt;&lt;small&gt;Current environment&lt;/small&gt;&lt;/span&gt;
                  &lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
                &lt;/label&gt;
                &lt;label class=&quot;environment-choice&quot;&gt;
                  &lt;input type=&quot;checkbox&quot; data-env-a&gt;
                  &lt;span&gt;&lt;strong&gt;UAT&lt;/strong&gt;&lt;small&gt;Existing value · v3&lt;/small&gt;&lt;/span&gt;
                &lt;/label&gt;
                &lt;label class=&quot;environment-choice&quot;&gt;
                  &lt;input type=&quot;checkbox&quot; data-env-a&gt;
                  &lt;span&gt;&lt;strong&gt;Production&lt;/strong&gt;&lt;small&gt;Not set&lt;/small&gt;&lt;/span&gt;
                &lt;/label&gt;
                &lt;label class=&quot;environment-choice is-locked&quot;&gt;
                  &lt;input type=&quot;checkbox&quot; disabled&gt;
                  &lt;span&gt;&lt;strong&gt;Local&lt;/strong&gt;&lt;small&gt;Unavailable on this device&lt;/small&gt;&lt;/span&gt;
                  &lt;i data-lucide=&quot;lock-keyhole&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
                &lt;/label&gt;
              &lt;/div&gt;
              &lt;div class=&quot;overwrite-message&quot; data-overwrite-a hidden&gt;
                &lt;i data-lucide=&quot;triangle-alert&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
                UAT already has a value. Saving will create version 4.
              &lt;/div&gt;
            &lt;/fieldset&gt;
            &lt;div class=&quot;encrypt-note&quot;&gt;
              &lt;i data-lucide=&quot;shield-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
              &lt;span&gt;Values and notes are encrypted locally. Convex receives ciphertext only.&lt;/span&gt;
            &lt;/div&gt;
          &lt;/div&gt;
          &lt;footer class=&quot;product-modal-footer&quot;&gt;
            &lt;button class=&quot;btn btn-ghost&quot; type=&quot;button&quot;&gt;Cancel&lt;/button&gt;
            &lt;button class=&quot;btn btn-primary&quot; type=&quot;button&quot;&gt;&lt;i data-lucide=&quot;lock-keyhole&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span data-save-label-a&gt;Encrypt &amp;amp; save to 1 environment&lt;/span&gt;&lt;/button&gt;
          &lt;/footer&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;option-notes&quot;&gt;
        &lt;div&gt;&lt;strong&gt;Why it works&lt;/strong&gt;&lt;span&gt;One-step, explicit before encryption, minimal disruption to the current editor.&lt;/span&gt;&lt;/div&gt;
        &lt;div&gt;&lt;strong&gt;Trade-off&lt;/strong&gt;&lt;span&gt;Adds one bounded section to an already long modal.&lt;/span&gt;&lt;/div&gt;
        &lt;div&gt;&lt;strong&gt;Best fit&lt;/strong&gt;&lt;span&gt;Frequent multi-environment saves with low learning cost.&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/article&gt;

    &lt;article class=&quot;mockup-option&quot; id=&quot;mockup-b&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;tab-b&quot; data-option-panel=&quot;b&quot; hidden&gt;

        &lt;div&gt;
          &lt;div class=&quot;option-title&quot;&gt;&lt;span class=&quot;option-letter&quot;&gt;B&lt;/span&gt;&lt;h3&gt;Value strategy&lt;/h3&gt;&lt;/div&gt;

        &lt;/div&gt;
        &lt;button class=&quot;btn btn-primary choose-option&quot; type=&quot;button&quot; data-choose=&quot;B · value strategy&quot;&gt;Choose B&lt;/button&gt;
      &lt;/div&gt;
      &lt;div class=&quot;product-stage&quot; data-environment=&quot;development&quot;&gt;
        &lt;div class=&quot;product-modal&quot;&gt;
          &lt;header class=&quot;product-modal-header&quot;&gt;
            &lt;div&gt;
              &lt;strong&gt;Create secret&lt;/strong&gt;
              &lt;span&gt;Customer portal · Login&lt;/span&gt;
            &lt;/div&gt;
            &lt;button class=&quot;icon-action&quot; type=&quot;button&quot; aria-label=&quot;Close mockup&quot;&gt;&lt;i data-lucide=&quot;x&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;/button&gt;
          &lt;/header&gt;
          &lt;div class=&quot;product-modal-body&quot;&gt;
            &lt;fieldset class=&quot;strategy-field&quot;&gt;
              &lt;legend&gt;Environment values&lt;/legend&gt;

                &lt;label class=&quot;strategy-choice is-active&quot;&gt;

                  &lt;span&gt;&lt;strong&gt;Use the same value&lt;/strong&gt;&lt;small&gt;Enter once and choose destinations&lt;/small&gt;&lt;/span&gt;
                &lt;/label&gt;
                &lt;label class=&quot;strategy-choice&quot;&gt;
                  &lt;input type=&quot;radio&quot; name=&quot;strategy&quot; value=&quot;different&quot;&gt;
                  &lt;span&gt;&lt;strong&gt;Use different values&lt;/strong&gt;&lt;small&gt;Configure environments separately&lt;/small&gt;&lt;/span&gt;
                &lt;/label&gt;
              &lt;/div&gt;
            &lt;/fieldset&gt;
            &lt;div class=&quot;field-grid&quot;&gt;
              &lt;label class=&quot;form-label&quot;&gt;Username&lt;input class=&quot;form-control&quot; value=&quot;ops@example.com&quot; aria-label=&quot;Option B username&quot;&gt;&lt;/label&gt;
              &lt;label class=&quot;form-label&quot;&gt;Password&lt;input class=&quot;form-control&quot; type=&quot;password&quot; value=&quot;example-password&quot; aria-label=&quot;Option B password&quot;&gt;&lt;/label&gt;
            &lt;/div&gt;
            &lt;div class=&quot;environment-table-wrap&quot;&gt;
              &lt;table class=&quot;table table-sm environment-table&quot;&gt;
                &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Environment&lt;/th&gt;&lt;th&gt;Destination&lt;/th&gt;&lt;th&gt;Current state&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
                &lt;tbody&gt;
                  &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;env-dot development&quot;&gt;&lt;/span&gt;Development&lt;/td&gt;&lt;td&gt;&lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; checked disabled&gt;&lt;span class=&quot;form-check-label&quot;&gt;Include&lt;/span&gt;&lt;/label&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;text-small&quot;&gt;New value&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                  &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;env-dot uat&quot;&gt;&lt;/span&gt;UAT&lt;/td&gt;&lt;td&gt;&lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; checked data-env-b&gt;&lt;span class=&quot;form-check-label&quot;&gt;Include&lt;/span&gt;&lt;/label&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;text-small&quot;&gt;Replace v3&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                  &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;env-dot production&quot;&gt;&lt;/span&gt;Production&lt;/td&gt;&lt;td&gt;&lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; data-env-b&gt;&lt;span class=&quot;form-check-label&quot;&gt;Include&lt;/span&gt;&lt;/label&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;text-small&quot;&gt;Not set&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                &lt;/tbody&gt;
              &lt;/table&gt;
            &lt;/div&gt;
            &lt;div class=&quot;encrypt-note&quot;&gt;
              &lt;i data-lucide=&quot;shield-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;

            &lt;/div&gt;
          &lt;/div&gt;
          &lt;footer class=&quot;product-modal-footer&quot;&gt;
            &lt;button class=&quot;btn btn-ghost&quot; type=&quot;button&quot;&gt;Cancel&lt;/button&gt;
            &lt;button class=&quot;btn btn-primary&quot; type=&quot;button&quot;&gt;&lt;i data-lucide=&quot;lock-keyhole&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;Encrypt &amp;amp; save&lt;/button&gt;
          &lt;/footer&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;option-notes&quot;&gt;
        &lt;div&gt;&lt;strong&gt;Why it works&lt;/strong&gt;&lt;span&gt;Makes the underlying value strategy explicit and can grow into per-environment authoring.&lt;/span&gt;&lt;/div&gt;
        &lt;div&gt;&lt;strong&gt;Trade-off&lt;/strong&gt;&lt;span&gt;Introduces a concept users must understand before entering a secret.&lt;/span&gt;&lt;/div&gt;

    &lt;/article&gt;

    &lt;article class=&quot;mockup-option&quot; id=&quot;mockup-c&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;tab-c&quot; data-option-panel=&quot;c&quot; hidden&gt;

            &lt;button class=&quot;icon-action&quot; type=&quot;button&quot; aria-label=&quot;Close mockup&quot;&gt;&lt;i data-lucide=&quot;x&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;/button&gt;

          &lt;div class=&quot;product-modal-body&quot;&gt;
            &lt;div class=&quot;distribution-copy&quot;&gt;

            &lt;div class=&quot;copy-choices&quot;&gt;
              &lt;label class=&quot;copy-choice&quot;&gt;
                &lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; data-env-c&gt;
                &lt;span&gt;&lt;strong&gt;UAT&lt;/strong&gt;&lt;small&gt;Will replace version 3&lt;/small&gt;&lt;/span&gt;
                &lt;span class=&quot;viz-badge&quot;&gt;Existing&lt;/span&gt;
              &lt;/label&gt;
              &lt;label class=&quot;copy-choice&quot;&gt;
                &lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; data-env-c&gt;
                &lt;span&gt;&lt;strong&gt;Production&lt;/strong&gt;&lt;small&gt;No value set&lt;/small&gt;&lt;/span&gt;
              &lt;/label&gt;
              &lt;label class=&quot;copy-choice is-locked&quot;&gt;
                &lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; disabled&gt;
                &lt;span&gt;&lt;strong&gt;Local&lt;/strong&gt;&lt;small&gt;Unavailable on this device&lt;/small&gt;&lt;/span&gt;
                &lt;i data-lucide=&quot;lock-keyhole&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
              &lt;/label&gt;

    &lt;h2 id=&quot;contract-heading&quot;&gt;Behavior to make explicit&lt;/h2&gt;
    &lt;div class=&quot;contract-grid&quot;&gt;
      &lt;article&gt;
        &lt;i data-lucide=&quot;copy-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div&gt;&lt;strong&gt;What is copied&lt;/strong&gt;&lt;p&gt;The entire encrypted payload for the selected type: credentials or key fields plus notes. Name, type, and project remain shared definition metadata.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article&gt;
        &lt;i data-lucide=&quot;unplug&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div&gt;&lt;strong&gt;No permanent link&lt;/strong&gt;&lt;p&gt;Copies may diverge. Editing one environment later does not silently update another.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article&gt;
        &lt;i data-lucide=&quot;key-round&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div&gt;&lt;strong&gt;Eligibility&lt;/strong&gt;&lt;p&gt;An environment is selectable only when the user has a grant and the current approved device can unwrap its key.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article&gt;
        &lt;i data-lucide=&quot;history&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div&gt;&lt;strong&gt;Overwrites&lt;/strong&gt;&lt;p&gt;An existing destination shows its current version before save and receives a normal version-history entry when replaced.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article&gt;
        &lt;i data-lucide=&quot;paperclip&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div&gt;&lt;strong&gt;Attachments excluded&lt;/strong&gt;&lt;p&gt;Attachments stay bound to one &lt;code&gt;secretValueId&lt;/code&gt;; this feature does not copy files.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article&gt;
        &lt;i data-lucide=&quot;scroll-text&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div&gt;&lt;strong&gt;Audit privacy&lt;/strong&gt;&lt;p&gt;Write one success event per environment without logging the secret name, plaintext, or destination list as sensitive context.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;architecture&quot; class=&quot;plan-section&quot; aria-labelledby=&quot;architecture-heading&quot;&gt;
    &lt;div class=&quot;section-kicker&quot;&gt;Technical design&lt;/div&gt;
    &lt;h2 id=&quot;architecture-heading&quot;&gt;Keep the data model; add a batch workflow&lt;/h2&gt;
    &lt;div class=&quot;architecture-flow&quot; aria-label=&quot;Multi-environment save flow&quot;&gt;
      &lt;div class=&quot;flow-node&quot;&gt;&lt;span&gt;1&lt;/span&gt;&lt;strong&gt;Form payload&lt;/strong&gt;&lt;small&gt;One plaintext object in memory&lt;/small&gt;&lt;/div&gt;
      &lt;i data-lucide=&quot;arrow-right&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
      &lt;div class=&quot;flow-node&quot;&gt;&lt;span&gt;2&lt;/span&gt;&lt;strong&gt;Per-env encryption&lt;/strong&gt;&lt;small&gt;Distinct key, AAD, IV, wrapped data key&lt;/small&gt;&lt;/div&gt;
      &lt;i data-lucide=&quot;arrow-right&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
      &lt;div class=&quot;flow-node&quot;&gt;&lt;span&gt;3&lt;/span&gt;&lt;strong&gt;Batch mutation&lt;/strong&gt;&lt;small&gt;Authorize every target and check versions&lt;/small&gt;&lt;/div&gt;
      &lt;i data-lucide=&quot;arrow-right&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
      &lt;div class=&quot;flow-node&quot;&gt;&lt;span&gt;4&lt;/span&gt;&lt;strong&gt;Atomic commit&lt;/strong&gt;&lt;small&gt;One value row and audit event per target&lt;/small&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;architecture-columns&quot;&gt;
      &lt;article&gt;
        &lt;h3&gt;Frontend&lt;/h3&gt;
        &lt;ul class=&quot;check-list&quot;&gt;
          &lt;li&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Replace the single-key editor dependency with a target-key loader for the user’s allowed environments.&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Fetch destination state for the selected definition: not set, version number, or unavailable.&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Encrypt the same &lt;code&gt;SecretPayload&lt;/code&gt; once per target with environment-specific &lt;code&gt;secretAad&lt;/code&gt;.&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Keep plaintext and unwrapped keys in browser memory only; clear busy state and errors without serializing them.&lt;/span&gt;&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/article&gt;
      &lt;article&gt;
        &lt;h3&gt;Convex&lt;/h3&gt;
        &lt;ul class=&quot;check-list&quot;&gt;
          &lt;li&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Add &lt;code&gt;getTargetStates&lt;/code&gt; for version/availability metadata after per-environment authorization.&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Add &lt;code&gt;saveAcrossEnvironments&lt;/code&gt; with shared definition fields and a non-empty, unique array of encrypted target values.&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Authorize all targets before writes, enforce expected versions, then update in one mutation transaction.&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Retain the current tables and indexes; Local continues to use the acting user as &lt;code&gt;ownerUserId&lt;/code&gt;.&lt;/span&gt;&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/article&gt;
    &lt;/div&gt;

    &lt;div class=&quot;schema-callout&quot;&gt;
      &lt;div&gt;&lt;span class=&quot;viz-badge&quot;&gt;No migration&lt;/span&gt;&lt;strong&gt;One definition, separate value records&lt;/strong&gt;&lt;/div&gt;
      &lt;code&gt;secretDefinitions → secretValues[development, uat, production, local-owner]&lt;/code&gt;
      &lt;p&gt;The schema already models exactly the required state. The new feature orchestrates multiple existing per-environment records; it does not introduce a shared ciphertext or cross-environment key.&lt;/p&gt;
    &lt;/div&gt;

    &lt;div class=&quot;file-map&quot;&gt;
      &lt;div&gt;&lt;code&gt;src/App.tsx&lt;/code&gt;&lt;span&gt;Editor state, environment eligibility, overwrite disclosure, multi-target submit.&lt;/span&gt;&lt;/div&gt;
      &lt;div&gt;&lt;code&gt;src/lib/crypto.ts&lt;/code&gt;&lt;span&gt;Reuse encryption primitives; optionally add a small typed helper for per-target encryption.&lt;/span&gt;&lt;/div&gt;
      &lt;div&gt;&lt;code&gt;src/index.css&lt;/code&gt;&lt;span&gt;Destination selector, responsive stacking, locked and overwrite states.&lt;/span&gt;&lt;/div&gt;
      &lt;div&gt;&lt;code&gt;convex/secrets.ts&lt;/code&gt;&lt;span&gt;Target-state query and atomic batch save mutation.&lt;/span&gt;&lt;/div&gt;
      &lt;div&gt;&lt;code&gt;convex/validators.ts&lt;/code&gt;&lt;span&gt;Derived validator for each encrypted environment target.&lt;/span&gt;&lt;/div&gt;
      &lt;div&gt;&lt;code&gt;convex/secrets.test.ts&lt;/code&gt;&lt;span&gt;Authorization, isolation, concurrency, rollback, audit, and version-history coverage.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;delivery&quot; class=&quot;plan-section&quot; aria-labelledby=&quot;delivery-heading&quot;&gt;
    &lt;div class=&quot;section-kicker&quot;&gt;Implementation sequence&lt;/div&gt;
    &lt;h2 id=&quot;delivery-heading&quot;&gt;Four reviewable slices&lt;/h2&gt;
    &lt;ol class=&quot;delivery-list&quot;&gt;
      &lt;li&gt;
        &lt;span class=&quot;delivery-marker&quot;&gt;1&lt;/span&gt;
        &lt;div&gt;&lt;strong&gt;Backend contract and tests&lt;/strong&gt;&lt;p&gt;Add target-state lookup and atomic batch save. Test duplicate/empty targets, missing access, Local ownership, optimistic concurrency, rollback, history, and audit behavior.&lt;/p&gt;&lt;span class=&quot;delivery-gate&quot;&gt;Gate: all existing and new Convex tests pass&lt;/span&gt;&lt;/div&gt;
      &lt;/li&gt;
      &lt;li&gt;
        &lt;span class=&quot;delivery-marker&quot;&gt;2&lt;/span&gt;
        &lt;div&gt;&lt;strong&gt;Multi-environment encryption orchestration&lt;/strong&gt;&lt;p&gt;Load each eligible device envelope, encrypt per target using the correct key and AAD, and submit one typed batch.&lt;/p&gt;&lt;span class=&quot;delivery-gate&quot;&gt;Gate: ciphertext differs across targets and decrypts only with its target key&lt;/span&gt;&lt;/div&gt;
      &lt;/li&gt;
      &lt;li&gt;
        &lt;span class=&quot;delivery-marker&quot;&gt;3&lt;/span&gt;
        &lt;div&gt;&lt;strong&gt;Recommended editor UI&lt;/strong&gt;&lt;p&gt;Implement Option A with current environment locked on, unavailable targets disabled, current versions visible, and pluralized save progress/result copy.&lt;/p&gt;&lt;span class=&quot;delivery-gate&quot;&gt;Gate: keyboard, narrow viewport, error, and overwrite states verified&lt;/span&gt;&lt;/div&gt;
      &lt;/li&gt;
      &lt;li&gt;
        &lt;span class=&quot;delivery-marker&quot;&gt;4&lt;/span&gt;
        &lt;div&gt;&lt;strong&gt;Regression and release hardening&lt;/strong&gt;&lt;p&gt;Verify single-environment create/edit is unchanged, inspect production bundle, exercise concurrent edits, and document snapshot semantics.&lt;/p&gt;&lt;span class=&quot;delivery-gate&quot;&gt;Gate: lint, build, full test suite, manual encrypted-flow check&lt;/span&gt;&lt;/div&gt;
      &lt;/li&gt;
    &lt;/ol&gt;
  &lt;/section&gt;

  &lt;section id=&quot;acceptance&quot; class=&quot;plan-section&quot; aria-labelledby=&quot;acceptance-heading&quot;&gt;
    &lt;div class=&quot;section-kicker&quot;&gt;Definition of done&lt;/div&gt;
    &lt;h2 id=&quot;acceptance-heading&quot;&gt;Acceptance criteria&lt;/h2&gt;
    &lt;div class=&quot;acceptance-grid&quot;&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;A user can select two or more unlocked environments while creating or editing a secret.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;The current environment is selected by default; at least one destination is always required.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;Locked or ungranted environments are visible but disabled with a reason.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;Existing destination values show the version that will be replaced before submission.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;Each target receives independently generated ciphertext bound to that environment’s AAD and key.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;If authorization, version validation, or any write fails, no selected environment is changed.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;Every overwritten value retains its prior ciphertext in that environment’s version history.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;Audit logs contain one privacy-safe event for every environment written.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;Attachments are not copied and the UI never implies that they are.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;A later single-environment edit does not change other environments.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;The existing one-environment workflow remains valid and produces the same result.&lt;/span&gt;&lt;/label&gt;
      &lt;label&gt;&lt;input type=&quot;checkbox&quot;&gt;&lt;span&gt;The selector and warnings reflow without clipping at mobile widths.&lt;/span&gt;&lt;/label&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;plan-section&quot; aria-labelledby=&quot;risks-heading&quot;&gt;
    &lt;div class=&quot;section-kicker&quot;&gt;Risk controls&lt;/div&gt;
    &lt;h2 id=&quot;risks-heading&quot;&gt;Failure modes to design out&lt;/h2&gt;
    &lt;div class=&quot;risk-list&quot;&gt;
      &lt;article&gt;&lt;span class=&quot;risk-tag&quot;&gt;Security&lt;/span&gt;&lt;strong&gt;Reusing ciphertext between environments&lt;/strong&gt;&lt;p&gt;Never copy an encrypted payload. Re-encrypt the plaintext separately with each environment key, fresh IVs, and matching AAD.&lt;/p&gt;&lt;/article&gt;
      &lt;article&gt;&lt;span class=&quot;risk-tag&quot;&gt;Authorization&lt;/span&gt;&lt;strong&gt;Partial access discovered mid-write&lt;/strong&gt;&lt;p&gt;Check every target first inside the mutation. Throw before changing the definition, values, versions, or audit events.&lt;/p&gt;&lt;/article&gt;
      &lt;article&gt;&lt;span class=&quot;risk-tag&quot;&gt;Concurrency&lt;/span&gt;&lt;strong&gt;Silently replacing a newer target value&lt;/strong&gt;&lt;p&gt;Require the expected version for every existing target and reject the whole batch on any mismatch.&lt;/p&gt;&lt;/article&gt;
      &lt;article&gt;&lt;span class=&quot;risk-tag&quot;&gt;Expectation&lt;/span&gt;&lt;strong&gt;Users assume values remain synchronized&lt;/strong&gt;&lt;p&gt;Use “encrypted copy” and “same at save time” language; avoid “linked” or “sync” in product copy.&lt;/p&gt;&lt;/article&gt;
      &lt;article&gt;&lt;span class=&quot;risk-tag&quot;&gt;Local&lt;/span&gt;&lt;strong&gt;Confusing private and shared scope&lt;/strong&gt;&lt;p&gt;Label Local as private to the signed-in identity and keep current &lt;code&gt;ownerUserId&lt;/code&gt; handling.&lt;/p&gt;&lt;/article&gt;
      &lt;article&gt;&lt;span class=&quot;risk-tag&quot;&gt;Recovery&lt;/span&gt;&lt;strong&gt;One target key cannot be unwrapped&lt;/strong&gt;&lt;p&gt;Disable that destination before submit and keep the currently editable environment available.&lt;/p&gt;&lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;questions&quot; class=&quot;plan-section questions-section&quot; aria-labelledby=&quot;questions-heading&quot;&gt;
    &lt;div class=&quot;section-kicker&quot;&gt;Questions for review&lt;/div&gt;
    &lt;h2 id=&quot;questions-heading&quot;&gt;Decisions to confirm before implementation&lt;/h2&gt;
    &lt;ol&gt;
      &lt;li&gt;&lt;strong&gt;Should Local be eligible?&lt;/strong&gt; Recommendation: yes, but label it “Private to you” and require the current device’s Local key.&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Should encrypted notes copy with the credential fields?&lt;/strong&gt; Recommendation: yes, because notes are part of the existing atomic &lt;code&gt;SecretPayload&lt;/code&gt;.&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Should a multi-environment edit be allowed to overwrite Production in the first release?&lt;/strong&gt; Recommendation: yes, with explicit existing-version text; avoid a one-off confirmation unless the product already requires one for Production writes.&lt;/li&gt;
    &lt;/ol&gt;
  &lt;/section&gt;

&lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&quot;multi-environment-secret-plan&quot;);
    if (!root) return;

    const tabs = [...root.querySelectorAll(&quot;[data-option-tab]&quot;)];
    const panels = [...root.querySelectorAll(&quot;[data-option-panel]&quot;)];
    tabs.forEach((tab) =&gt; {
      tab.addEventListener(&quot;click&quot;, () =&gt; {
        const option = tab.getAttribute(&quot;data-option-tab&quot;);
        tabs.forEach((candidate) =&gt; {
          const selected = candidate === tab;
          candidate.classList.toggle(&quot;is-selected&quot;, selected);
          candidate.setAttribute(&quot;aria-selected&quot;, String(selected));
        });
        panels.forEach((panel) =&gt; {
          panel.hidden = panel.getAttribute(&quot;data-option-panel&quot;) !== option;
        });
      });
    });

    const updateA = () =&gt; {
      const inputs = [...root.querySelectorAll(&quot;[data-env-a]&quot;)];
      const count = inputs.filter((input) =&gt; input.checked).length;
      const label = root.querySelector(&quot;[data-save-label-a]&quot;);
      if (label) label.textContent = `Encrypt &amp; save to ${count} ${count === 1 ? &quot;environment&quot; : &quot;environments&quot;}`;
      const overwrite = root.querySelector(&quot;[data-overwrite-a]&quot;);
      if (overwrite) overwrite.hidden = !inputs[1]?.checked;
    };
    root.querySelectorAll(&quot;[data-env-a]&quot;).forEach((input) =&gt; input.addEventListener(&quot;change&quot;, updateA));
    updateA();

    const updateB = () =&gt; {
      const selected = 1 + [...root.querySelectorAll(&quot;[data-env-b]&quot;)].filter((input) =&gt; input.checked).length;
      const count = root.querySelector(&quot;[data-count-b]&quot;);
      if (count) count.textContent = `${selected} ${selected === 1 ? &quot;environment&quot; : &quot;environments&quot;}`;
    };
    root.querySelectorAll(&quot;[data-env-b]&quot;).forEach((input) =&gt; input.addEventListener(&quot;change&quot;, updateB));
    updateB();

    const updateC = () =&gt; {
      const count = [...root.querySelectorAll(&quot;[data-env-c]&quot;)].filter((input) =&gt; input.checked).length;
      const button = root.querySelector(&quot;[data-copy-button-c]&quot;);
      if (!button) return;
      button.disabled = count === 0;
      const label = button.querySelector(&quot;span&quot;);
      if (label) label.textContent = count === 0 ? &quot;Copy to environments&quot; : `Copy to ${count} ${count === 1 ? &quot;environment&quot; : &quot;environments&quot;}`;
    };
    root.querySelectorAll(&quot;[data-env-c]&quot;).forEach((input) =&gt; input.addEventListener(&quot;change&quot;, updateC));
    updateC();

    const chosen = root.querySelector(&quot;#chosen-option&quot;);
    root.querySelectorAll(&quot;[data-choose]&quot;).forEach((button) =&gt; {
      button.addEventListener(&quot;click&quot;, () =&gt; {
        const choice = button.getAttribute(&quot;data-choose&quot;) || &quot;&quot;;
        if (chosen) chosen.textContent = choice;
        root.querySelectorAll(&quot;[data-choose]&quot;).forEach((candidate) =&gt; {
          candidate.textContent = candidate === button ? &quot;Selected&quot; : `Choose ${candidate.getAttribute(&quot;data-choose&quot;)?.slice(0, 1)}`;
          candidate.classList.toggle(&quot;btn-primary&quot;, candidate === button);
        });
      });
    });
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {

})();
&lt;/script&gt;
