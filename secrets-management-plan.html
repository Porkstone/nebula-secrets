      &lt;h2&gt;01. Product scope&lt;/h2&gt;
      &lt;p class=&quot;section-intro&quot;&gt;The MVP is a single-team secrets vault. A secret has one definition and can hold a distinct value in each environment. Local values belong to one user; Development, UAT, and Production values are shared by everyone who has access to that environment.&lt;/p&gt;

      &lt;h2&gt;02. System architecture&lt;/h2&gt;
      &lt;p class=&quot;section-intro&quot;&gt;The browser is the cryptographic trust boundary. Convex coordinates data and access metadata; Vercel serves the client application. Plaintext values never cross the browser boundary.&lt;/p&gt;

      &lt;div class=&quot;flow&quot; role=&quot;img&quot; aria-label=&quot;The Vite application encrypts and decrypts data in the browser, sends ciphertext through Convex functions, and stores encrypted records and encrypted files in Convex.&quot;&gt;
        &lt;div class=&quot;flow-node&quot;&gt;
          &lt;span class=&quot;icon-label&quot;&gt;&lt;i data-lucide=&quot;monitor-smartphone&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;strong&gt;Vite client&lt;/strong&gt;&lt;/span&gt;
          &lt;span class=&quot;text-small&quot;&gt;Forms, local validation, Web Crypto, reveal and copy controls&lt;/span&gt;
        &lt;/div&gt;
        &lt;i class=&quot;flow-arrow&quot; data-lucide=&quot;arrow-right&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div class=&quot;flow-node&quot;&gt;
          &lt;span class=&quot;icon-label&quot;&gt;&lt;i data-lucide=&quot;waypoints&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;strong&gt;Convex functions&lt;/strong&gt;&lt;/span&gt;
          &lt;span class=&quot;text-small&quot;&gt;Authorization checks, ciphertext CRUD, grants, audit events&lt;/span&gt;
        &lt;/div&gt;
        &lt;i class=&quot;flow-arrow&quot; data-lucide=&quot;arrow-right&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div class=&quot;flow-node&quot;&gt;
          &lt;span class=&quot;icon-label&quot;&gt;&lt;i data-lucide=&quot;database-zap&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;strong&gt;Convex storage&lt;/strong&gt;&lt;/span&gt;
          &lt;span class=&quot;text-small&quot;&gt;Encrypted payloads, wrapped keys, minimal metadata, encrypted files&lt;/span&gt;
        &lt;/div&gt;

      &lt;div class=&quot;two-col&quot;&gt;
        &lt;div class=&quot;subsection&quot;&gt;
          &lt;h3&gt;Frontend modules&lt;/h3&gt;
          &lt;ul class=&quot;plain-list&quot;&gt;
            &lt;li&gt;&lt;code&gt;crypto/&lt;/code&gt; — key creation, envelope encryption, rotation, recovery, and attachment streaming.&lt;/li&gt;

            &lt;li&gt;&lt;code&gt;admin/&lt;/code&gt; — users, roles, environment grants, revocation, and key rewrapping ceremonies.&lt;/li&gt;

            &lt;li&gt;&lt;code&gt;access&lt;/code&gt; — manage roles, environment grants, and wrapped environment keys.&lt;/li&gt;
            &lt;li&gt;&lt;code&gt;audit&lt;/code&gt; — append server-verified actions and query visible audit records.&lt;/li&gt;
            &lt;li&gt;&lt;code&gt;maintenance&lt;/code&gt; — expire incomplete uploads, enforce retention, and report rotation state.&lt;/li&gt;

    &lt;section class=&quot;section&quot; id=&quot;access&quot;&gt;
      &lt;h2&gt;03. Roles and environment access&lt;/h2&gt;
      &lt;p class=&quot;section-intro&quot;&gt;Role and environment access are separate controls. A role determines which operations a user may perform; an environment grant determines which shared scope they may access. Being an Admin does not silently grant every environment.&lt;/p&gt;

      &lt;div class=&quot;table-responsive&quot;&gt;
        &lt;table class=&quot;table table-sm&quot;&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Capability&lt;/th&gt;&lt;th&gt;Developer&lt;/th&gt;&lt;th&gt;Admin&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;Use own Local values&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yes&quot;&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Yes&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yes&quot;&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Yes&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Read or change a granted shared environment&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yes&quot;&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Yes&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yes&quot;&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Yes&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;See an ungranted environment&lt;/td&gt;&lt;td class=&quot;no&quot;&gt;No&lt;/td&gt;&lt;td class=&quot;no&quot;&gt;No&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Manage secret definitions&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yes&quot;&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Yes&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yes&quot;&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Yes&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Grant or revoke environment access&lt;/td&gt;&lt;td class=&quot;no&quot;&gt;No&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yes&quot;&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Yes&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Assign Developer or Admin role&lt;/td&gt;&lt;td class=&quot;no&quot;&gt;No&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yes&quot;&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Yes&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Review team audit events&lt;/td&gt;&lt;td class=&quot;no&quot;&gt;Own activity&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yes&quot;&gt;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Yes&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;div class=&quot;two-col&quot;&gt;
        &lt;div class=&quot;subsection&quot;&gt;
          &lt;h3&gt;Environment rules&lt;/h3&gt;
          &lt;ul class=&quot;plain-list&quot;&gt;
            &lt;li&gt;&lt;strong&gt;Local:&lt;/strong&gt; implicit for the current user; every stored row includes that user as owner and is never returned to another user.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Development, UAT, Production:&lt;/strong&gt; one shared value per secret and environment; access requires an active grant.&lt;/li&gt;
            &lt;li&gt;Creating or changing a value requires access to that environment; viewing metadata alone should not reveal encrypted names or notes.&lt;/li&gt;
            &lt;li&gt;Production access should be visually distinct and re-confirmed before a reveal, copy, edit, download, or delete.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;subsection&quot;&gt;
          &lt;h3&gt;Admin workflow&lt;/h3&gt;
          &lt;ol class=&quot;plain-list&quot;&gt;
            &lt;li&gt;Select a user and assign Developer or Admin.&lt;/li&gt;
            &lt;li&gt;Grant Development, UAT, and/or Production independently.&lt;/li&gt;
            &lt;li&gt;An Admin who already holds that environment key—or a second key custodian—wraps it to the recipient’s verified public key.&lt;/li&gt;
            &lt;li&gt;Write an audit event with actor, target, scope, reason, and time.&lt;/li&gt;
            &lt;li&gt;On revocation, remove the key envelope and schedule environment-key rotation.&lt;/li&gt;
          &lt;/ol&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;callout&quot;&gt;
        &lt;i data-lucide=&quot;key-square&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div&gt;
          &lt;strong&gt;Grant authority and cryptographic custody must meet&lt;/strong&gt;
          &lt;p class=&quot;text-small&quot;&gt;An Admin can approve access metadata, but simple Web Crypto cannot grant a key the Admin does not hold. For the MVP, require the granting Admin to be an existing member of that environment, or require a second environment key custodian to complete the key wrap. This keeps “Admin without environment access” technically honest.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;section&quot; id=&quot;data&quot;&gt;
      &lt;h2&gt;04. Data model and secret shapes&lt;/h2&gt;
      &lt;p class=&quot;section-intro&quot;&gt;Keep queryable authorization metadata separate from encrypted content. Secret values are versioned so concurrent edits, rollback, and audit references remain deterministic.&lt;/p&gt;

      &lt;div class=&quot;record-map&quot;&gt;
        &lt;div class=&quot;record&quot;&gt;&lt;code&gt;users&lt;/code&gt;&lt;p class=&quot;text-small&quot;&gt;Role, status, future identity reference, public encryption keys, and key version.&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;record&quot;&gt;&lt;code&gt;environmentGrants&lt;/code&gt;&lt;p class=&quot;text-small&quot;&gt;User, environment, status, grantor, timestamps, and wrapped environment-key envelope.&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;record&quot;&gt;&lt;code&gt;secretDefinitions&lt;/code&gt;&lt;p class=&quot;text-small&quot;&gt;Encrypted name, type marker, archive state, creator, timestamps, and optimistic version.&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;record&quot;&gt;&lt;code&gt;secretValues&lt;/code&gt;&lt;p class=&quot;text-small&quot;&gt;Definition, environment, Local owner when applicable, ciphertext, nonce, wrapped data key, and version.&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;record&quot;&gt;&lt;code&gt;attachments&lt;/code&gt;&lt;p class=&quot;text-small&quot;&gt;Parent version, encrypted filename and MIME type, chunk manifest, wrapped file key, storage ID, and hash.&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;record&quot;&gt;&lt;code&gt;auditEvents&lt;/code&gt;&lt;p class=&quot;text-small&quot;&gt;Append-only actor, action, target ID, environment, result, timestamp, and privacy-safe context.&lt;/p&gt;&lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;table-responsive&quot;&gt;
        &lt;table class=&quot;table table-sm&quot;&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Type&lt;/th&gt;&lt;th&gt;Encrypted fields&lt;/th&gt;&lt;th&gt;Common fields&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;icon-label&quot;&gt;&lt;i data-lucide=&quot;log-in&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Login&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Username, password, sign-in URL&lt;/td&gt;&lt;td rowspan=&quot;3&quot;&gt;Display name, notes, attachments&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;icon-label&quot;&gt;&lt;i data-lucide=&quot;braces&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; API Key&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Key or token, optional endpoint/account label&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;icon-label&quot;&gt;&lt;i data-lucide=&quot;badge-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; License Key&lt;/span&gt;&lt;/td&gt;&lt;td&gt;License key, optional licensee and expiry date&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;div class=&quot;callout&quot;&gt;
        &lt;i data-lucide=&quot;list-filter&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div&gt;
          &lt;strong&gt;Server-visible metadata is deliberately small&lt;/strong&gt;
          &lt;p class=&quot;text-small&quot;&gt;Convex may see opaque record IDs, environment, secret type, ownership/grant references, version numbers, timestamps, ciphertext sizes, and lifecycle state. Display names, usernames, values, notes, filenames, MIME types, URLs, and license details remain encrypted.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;section&quot; id=&quot;protection&quot;&gt;
      &lt;h2&gt;05. Protecting sensitive data from Convex administrators&lt;/h2&gt;
      &lt;p class=&quot;section-intro&quot;&gt;Use client-side end-to-end envelope encryption. The browser encrypts before calling Convex and decrypts only after authorization metadata and cryptographic key access both succeed. A Convex administrator sees ciphertext and key envelopes, but does not possess the private keys needed to open them.&lt;/p&gt;

      &lt;div class=&quot;crypto-flow&quot; aria-label=&quot;Five-step encryption design&quot;&gt;
        &lt;div class=&quot;crypto-step&quot;&gt;
          &lt;span class=&quot;step-number&quot;&gt;1&lt;/span&gt;
          &lt;div&gt;&lt;h3&gt;Establish user and environment keys&lt;/h3&gt;&lt;p&gt;Each approved device creates a non-exportable asymmetric key pair with Web Crypto and keeps its private key in client-side protected storage. Shared environments have random 256-bit environment keys; Local uses a key unique to the user. Only public keys and wrapped environment keys are stored in Convex. A trusted device or key custodian approves and signs key enrollment so Convex cannot silently substitute an attacker’s public key.&lt;/p&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;crypto-step&quot;&gt;
          &lt;span class=&quot;step-number&quot;&gt;2&lt;/span&gt;
          &lt;div&gt;&lt;h3&gt;Encrypt every secret version in the browser&lt;/h3&gt;&lt;p&gt;Generate a fresh random 256-bit data-encryption key for each version. Encrypt the complete sensitive payload with AES-256-GCM and unique 96-bit nonce. Bind record ID, environment, owner, type, schema version, and version number as authenticated additional data.&lt;/p&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;crypto-step&quot;&gt;
          &lt;span class=&quot;step-number&quot;&gt;3&lt;/span&gt;
          &lt;div&gt;&lt;h3&gt;Wrap, then discard the data key&lt;/h3&gt;&lt;p&gt;Wrap the version’s data key with the relevant Local or shared environment key. Send only ciphertext, nonce, authentication tag, wrapped key, and minimal metadata to Convex. Clear transient plaintext and key references as soon as practical.&lt;/p&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;crypto-step&quot;&gt;
          &lt;span class=&quot;step-number&quot;&gt;4&lt;/span&gt;
          &lt;div&gt;&lt;h3&gt;Encrypt attachments independently&lt;/h3&gt;&lt;p&gt;Give each file its own random key. Encrypt in bounded chunks with a unique nonce per chunk and authenticate the attachment ID and chunk index. Upload only encrypted chunks; encrypt filename, MIME type, notes, and integrity manifest with the parent payload.&lt;/p&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;crypto-step&quot;&gt;
          &lt;span class=&quot;step-number&quot;&gt;5&lt;/span&gt;
          &lt;div&gt;&lt;h3&gt;Decrypt only after both checks pass&lt;/h3&gt;&lt;p&gt;Convex first confirms the role and active environment grant. The client then unwraps the environment key using the device private key, unwraps the version key, verifies AES-GCM integrity, and reveals plaintext only for the requested action.&lt;/p&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;boundary&quot; aria-label=&quot;Security boundary summary&quot;&gt;
        &lt;div class=&quot;boundary-item&quot;&gt;&lt;strong&gt;Browser may hold&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;Plaintext briefly, private device keys, unwrapped environment keys in memory&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;boundary-item&quot;&gt;&lt;strong&gt;Convex may hold&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;Ciphertext, wrapped keys, public keys, grants, minimal metadata, audit records&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;boundary-item&quot;&gt;&lt;strong&gt;Convex must never receive&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;Plaintext values or notes, file contents, unwrapped keys, private keys, decrypted logs&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;two-col&quot;&gt;
        &lt;div class=&quot;subsection&quot;&gt;
          &lt;h3&gt;Hardening controls&lt;/h3&gt;
          &lt;ul class=&quot;plain-list&quot;&gt;
            &lt;li&gt;Use the browser’s Web Crypto API; do not implement cryptographic primitives manually.&lt;/li&gt;
            &lt;li&gt;Self-host the production Vite bundle with no third-party runtime scripts; apply a strict CSP and Trusted Types where supported.&lt;/li&gt;
            &lt;li&gt;Prevent plaintext in URLs, analytics, error reports, logs, browser storage, service-worker caches, and Convex arguments visible to logs.&lt;/li&gt;
            &lt;li&gt;Default to masked fields; require deliberate reveal/copy/download actions and clear clipboard after a configurable interval where the browser permits.&lt;/li&gt;
            &lt;li&gt;Sign or authenticate key-directory updates and bind keys to authenticated identities once auth is added.&lt;/li&gt;
            &lt;li&gt;Back up ciphertext and key envelopes together; regularly test recovery on an isolated client.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;subsection&quot;&gt;
          &lt;h3&gt;Rotation and revocation&lt;/h3&gt;
          &lt;ul class=&quot;plain-list&quot;&gt;
            &lt;li&gt;Every key carries an algorithm and version so cryptography can be migrated.&lt;/li&gt;
            &lt;li&gt;Revocation immediately blocks Convex reads and removes the recipient’s active key envelope.&lt;/li&gt;
            &lt;li&gt;Rotate the affected environment key; an authorized client rewraps active data keys without exposing secret plaintext to Convex.&lt;/li&gt;
            &lt;li&gt;Rotate the actual third-party credential separately when a removed user may have copied it.&lt;/li&gt;
            &lt;li&gt;Retain old wrapped keys only as required to recover permitted historical versions, then cryptographically erase them.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;callout&quot;&gt;
        &lt;i data-lucide=&quot;shield-alert&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div&gt;
          &lt;strong&gt;What this guarantee does—and does not—cover&lt;/strong&gt;
          &lt;p class=&quot;text-small&quot;&gt;A Convex administrator acting alone cannot decrypt stored values or files. They can still delete, withhold, replay, or corrupt ciphertext, so authenticated encryption, version checks, audit trails, and backups are required. A compromised user device, malicious browser extension, authorized user, or malicious Vercel deployment can see plaintext after client-side decryption; protect Vercel and release pipelines with separate administrators, review, MFA, and immutable build provenance.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;section&quot; id=&quot;experience&quot;&gt;
      &lt;h2&gt;06. Key user journeys&lt;/h2&gt;
      &lt;div class=&quot;two-col&quot;&gt;
        &lt;div class=&quot;subsection&quot;&gt;
          &lt;h3&gt;Developer&lt;/h3&gt;
          &lt;ol class=&quot;plain-list&quot;&gt;
            &lt;li&gt;Choose an environment; only Local and granted shared environments appear.&lt;/li&gt;
            &lt;li&gt;Browse secret definitions without exposing values in the list.&lt;/li&gt;
            &lt;li&gt;Open a secret, deliberately reveal or copy a value, and see its last-changed context.&lt;/li&gt;
            &lt;li&gt;Create or edit a typed form; encryption completes before submission.&lt;/li&gt;
            &lt;li&gt;Attach a file, watch local encryption and ciphertext upload progress, then verify download/decryption.&lt;/li&gt;
          &lt;/ol&gt;
        &lt;/div&gt;
        &lt;div class=&quot;subsection&quot;&gt;
          &lt;h3&gt;Admin&lt;/h3&gt;
          &lt;ol class=&quot;plain-list&quot;&gt;
            &lt;li&gt;Review active and suspended users, roles, key status, and environment grants.&lt;/li&gt;
            &lt;li&gt;Grant an environment and complete the recipient key-wrapping step.&lt;/li&gt;
            &lt;li&gt;Revoke access, trigger key rotation, and see any secrets still awaiting rewrap.&lt;/li&gt;
            &lt;li&gt;Review audit events for access changes and sensitive actions without seeing secret values.&lt;/li&gt;
            &lt;li&gt;Recover access through a documented, dual-control break-glass process introduced with authentication.&lt;/li&gt;
          &lt;/ol&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;section&quot; id=&quot;delivery&quot;&gt;
      &lt;h2&gt;07. Delivery sequence&lt;/h2&gt;
      &lt;p class=&quot;section-intro&quot;&gt;Deliver vertical slices, with the cryptographic boundary established before real secret workflows. Estimates should be added after team size and assurance level are known.&lt;/p&gt;

      &lt;div class=&quot;timeline&quot;&gt;
        &lt;div class=&quot;phase&quot;&gt;&lt;div class=&quot;phase-label text-small&quot;&gt;Phase 0&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Foundations and decisions&lt;/h3&gt;&lt;p&gt;Vite/Vercel and Convex skeletons; fixed environments; schema; identity abstraction and seeded test users; threat model; browser support; file-size and retention decisions.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;phase&quot;&gt;&lt;div class=&quot;phase-label text-small&quot;&gt;Phase 1&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Encryption proof&lt;/h3&gt;&lt;p&gt;Device keys, environment-key envelopes, AES-GCM payloads, encrypted attachment prototype, key-version format, recovery rehearsal, and tests proving Convex receives no plaintext.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;phase&quot;&gt;&lt;div class=&quot;phase-label text-small&quot;&gt;Phase 2&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Core vault&lt;/h3&gt;&lt;p&gt;Typed secret forms, Local/shared value resolution, list and detail views, reveal/copy/edit flows, notes, optimistic concurrency, archive/restore, and version history.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;phase&quot;&gt;&lt;div class=&quot;phase-label text-small&quot;&gt;Phase 3&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Administration and attachments&lt;/h3&gt;&lt;p&gt;Role and grant management, public-key enrollment, grant/revoke/rewrap flows, encrypted uploads and downloads, audit viewer, cleanup jobs, and storage limits.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;phase&quot;&gt;&lt;div class=&quot;phase-label text-small&quot;&gt;Phase 4&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Hardening&lt;/h3&gt;&lt;p&gt;CSP, dependency and bundle review, redaction tests, abuse limits, backup/restore, rotation drills, accessibility, responsive behavior, production warnings, and security review.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;phase&quot;&gt;&lt;div class=&quot;phase-label text-small&quot;&gt;Later gate&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Authentication and production launch&lt;/h3&gt;&lt;p&gt;Connect the identity provider, replace the development stub, bind authenticated identity to keys and roles, test session and recovery flows, remove seeded users, and only then permit real secrets.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;section&quot; id=&quot;quality&quot;&gt;
      &lt;h2&gt;08. Quality and operations&lt;/h2&gt;
      &lt;div class=&quot;two-col&quot;&gt;
        &lt;div class=&quot;subsection&quot;&gt;
          &lt;h3&gt;Test strategy&lt;/h3&gt;
          &lt;ul class=&quot;plain-list&quot;&gt;
            &lt;li&gt;&lt;strong&gt;Unit:&lt;/strong&gt; serialization, AAD construction, nonce uniqueness, wrapping, schema validation, and access predicates.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Property/fuzz:&lt;/strong&gt; corrupt ciphertext, wrong owner/environment/version, missing chunks, stale key versions, and malformed envelopes must fail closed.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Integration:&lt;/strong&gt; assert Convex mutations, tables, file storage, logs, and errors contain no known plaintext canaries.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Authorization:&lt;/strong&gt; every role × environment × ownership combination, including suspended users and stale sessions.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;End-to-end:&lt;/strong&gt; create, reveal, copy, edit, attach, download, revoke, rotate, restore, and concurrent updates.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;subsection&quot;&gt;
          &lt;h3&gt;Operational signals&lt;/h3&gt;
          &lt;ul class=&quot;plain-list&quot;&gt;
            &lt;li&gt;Mutation failures, denied requests, failed decryptions, stale key envelopes, and incomplete uploads.&lt;/li&gt;
            &lt;li&gt;Grant/revoke/role changes and Production reveal/copy/download actions.&lt;/li&gt;
            &lt;li&gt;Ciphertext record counts, encrypted storage volume, rotation backlog, and backup age.&lt;/li&gt;
            &lt;li&gt;Never include secret names, plaintext fields, filenames, URLs, clipboard contents, or decrypted error context in telemetry.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;section&quot; id=&quot;acceptance&quot;&gt;
      &lt;h2&gt;09. MVP acceptance criteria&lt;/h2&gt;
      &lt;ul class=&quot;check-list&quot;&gt;
        &lt;li&gt;&lt;i data-lucide=&quot;circle-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;A user’s Local value is stored separately and cannot be queried, unwrapped, or displayed by another user.&lt;/span&gt;&lt;/li&gt;
        &lt;li&gt;&lt;i data-lucide=&quot;circle-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Development, UAT, and Production each hold one shared value visible only to actively granted users.&lt;/span&gt;&lt;/li&gt;
        &lt;li&gt;&lt;i data-lucide=&quot;circle-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Developer and Admin permissions are enforced in the UI and again in every Convex query, mutation, and action.&lt;/span&gt;&lt;/li&gt;
        &lt;li&gt;&lt;i data-lucide=&quot;circle-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Login, API Key, and License Key forms support notes and at least one encrypted attachment.&lt;/span&gt;&lt;/li&gt;
        &lt;li&gt;&lt;i data-lucide=&quot;circle-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Known plaintext canaries never appear in Convex records, file storage, logs, errors, analytics, URLs, or persistent browser storage.&lt;/span&gt;&lt;/li&gt;
        &lt;li&gt;&lt;i data-lucide=&quot;circle-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Tampered ciphertext, swapped environments, replayed versions, and missing attachment chunks are rejected without revealing partial content.&lt;/span&gt;&lt;/li&gt;
        &lt;li&gt;&lt;i data-lucide=&quot;circle-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;Grant, revoke, role change, reveal, copy, edit, archive, restore, upload, and download actions produce privacy-safe audit events.&lt;/span&gt;&lt;/li&gt;
        &lt;li&gt;&lt;i data-lucide=&quot;circle-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;A backup can be restored and decrypted by an authorized recovery client; Convex support or administrators cannot perform that decryption.&lt;/span&gt;&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/section&gt;

    &lt;section class=&quot;section&quot; id=&quot;decisions&quot;&gt;
      &lt;h2&gt;10. Decisions to confirm before build&lt;/h2&gt;
      &lt;p class=&quot;section-intro&quot;&gt;The requirements are sufficient for this plan. These choices affect implementation detail and can be settled in Phase 0 without blocking the initial architecture.&lt;/p&gt;
      &lt;div class=&quot;decision&quot;&gt;&lt;i data-lucide=&quot;circle-help&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;div&gt;&lt;strong&gt;Team structure&lt;/strong&gt;&lt;p class=&quot;text-small&quot;&gt;Assume one team/workspace for the MVP; confirm whether multiple projects or teams need isolation on day one.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;decision&quot;&gt;&lt;i data-lucide=&quot;circle-help&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;div&gt;&lt;strong&gt;Permissions within an environment&lt;/strong&gt;&lt;p class=&quot;text-small&quot;&gt;Assume one read/write grant; decide whether separate view, edit, and manage grants are required.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;decision&quot;&gt;&lt;i data-lucide=&quot;circle-help&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;div&gt;&lt;strong&gt;Attachments&lt;/strong&gt;&lt;p class=&quot;text-small&quot;&gt;Choose maximum file size, allowed/blocked formats, malware-scanning expectations, and retention after a version is archived.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;decision&quot;&gt;&lt;i data-lucide=&quot;circle-help&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;div&gt;&lt;strong&gt;Recovery and break-glass&lt;/strong&gt;&lt;p class=&quot;text-small&quot;&gt;Choose whether recovery is device-to-device, dual-admin, or backed by an external organization-controlled key.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;decision&quot;&gt;&lt;i data-lucide=&quot;circle-help&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;div&gt;&lt;strong&gt;History and deletion&lt;/strong&gt;&lt;p class=&quot;text-small&quot;&gt;Choose retention duration, whether rollback creates a new version, and when key deletion makes archived ciphertext unrecoverable.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
